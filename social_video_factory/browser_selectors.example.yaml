# =============================================================================
# social_video_factory — browser selector configuration (EXAMPLE / DEFAULTS)
# =============================================================================
#
# THIS IS THE FILE YOU EDIT when the Gemini / Flow web UI changes and the
# browser_flow mode can no longer find the prompt box, the submit button, the
# download/export control, etc.
#
# How it is used
# --------------
# Point SOCIAL_FACTORY_SELECTORS_FILE at a copy of this file to override it;
# if that env var is empty, this bundled example is used as-is.
#
# For each UI action the resolver tries, IN ORDER, until something matches:
#   1. `css:`   — CSS / text selectors, tried one at a time, top to bottom.
#   2. `role:`  — an accessible-role query (Playwright get_by_role).
#   3. `label:` — an accessible-label query (Playwright get_by_label).
#   4. `text:`  — visible text (Playwright get_by_text / a button of that name).
#   5. MANUAL PAUSE — if nothing matched, the tool saves a screenshot, prints
#      what you need to do, and waits for you to press Enter. Nothing is
#      bypassed; a human simply finishes the step in the open browser window.
#
# Because of this layering, an EMPTY or WRONG selector is not fatal — it just
# falls through to the next layer. So it is safe to leave a `css:` list partly
# wrong while you iterate.
#
# TUNING TIP: prefer the ACCESSIBLE hints (`role:` / `label:` / `text:`) over
# brittle `css:` class names. Google's apps rebuild their CSS class hashes
# constantly, but the accessible role + visible label of the prompt box and the
# "Generate"/"Send"/"Download" buttons are far more stable. The `css:` entries
# below are PLACEHOLDERS — verify them against your live UI (open DevTools,
# inspect the element) and replace as needed.
#
# Schema per target (`flow`, `gemini`):
#   prompt_box           — the text area you type the generation prompt into
#   submit               — the button that starts generation
#   generating_indicator — an element visible WHILE the video is generating
#   download             — the control that downloads the finished clip
#   export_mp4           — an MP4-format choice shown after pressing download
#   result_video         — the finished <video> element / result tile
# =============================================================================

# --- Google Flow (labs.google/fx/tools/flow) --------------------------------
flow:
  prompt_box:
    # Flow's prompt field is a free-text box. Accessible hints first.
    css:
      - "textarea"                               # PLACEHOLDER — verify against live UI
      - "div[contenteditable='true']"
      - "textarea[placeholder*='Generate' i]"
      - "textarea[aria-label*='prompt' i]"
    role:
      role: "textbox"
    label: "Prompt"
    text: ""

  submit:
    # The control that kicks off generation (often an arrow / "Create" button).
    css:
      - "button[aria-label*='Generate' i]"       # PLACEHOLDER — verify against live UI
      - "button[aria-label*='Create' i]"
      - "button[type='submit']"
    role:
      role: "button"
      name: "Create"
    text: "Generate"

  generating_indicator:
    # Visible WHILE generation runs; its DISAPPEARANCE signals completion.
    css:
      - "[role='progressbar']"                   # PLACEHOLDER — verify against live UI
      - "[aria-busy='true']"
    text: "Generating"

  download:
    # Usually behind a "More options" / overflow (⋮) menu on the result tile.
    css:
      - "button[aria-label*='Download' i]"       # PLACEHOLDER — verify against live UI
      - "a[download]"
      - "[aria-label*='More' i] >> nth=0"
    role:
      role: "button"
      name: "Download"
    text: "Download"

  export_mp4:
    # Shown only if a format menu appears after pressing Download.
    css:
      - "[data-format='mp4']"                    # PLACEHOLDER — verify against live UI
      - "[role='menuitem']:has-text('MP4')"
    role:
      role: "menuitem"
      name: "MP4"
    text: "MP4"

  result_video:
    # The finished clip; its APPEARANCE also signals completion.
    css:
      - "video"                                  # PLACEHOLDER — verify against live UI
      - "[data-testid='result-video']"

# --- Gemini (Omni) web UI (gemini.google.com) -------------------------------
gemini:
  prompt_box:
    css:
      - "div[contenteditable='true']"            # PLACEHOLDER — verify against live UI
      - "textarea"
      - "rich-textarea div[contenteditable='true']"
    role:
      role: "textbox"
    label: "Enter a prompt here"
    text: ""

  submit:
    css:
      - "button[aria-label*='Send' i]"           # PLACEHOLDER — verify against live UI
      - "button[aria-label*='Submit' i]"
    role:
      role: "button"
      name: "Send"
    text: "Send"

  generating_indicator:
    css:
      - "[role='progressbar']"                   # PLACEHOLDER — verify against live UI
      - "[aria-busy='true']"
    text: "Generating"

  download:
    css:
      - "button[aria-label*='Download' i]"       # PLACEHOLDER — verify against live UI
      - "a[download]"
    role:
      role: "button"
      name: "Download"
    text: "Download"

  export_mp4:
    css:
      - "[data-format='mp4']"                    # PLACEHOLDER — verify against live UI
      - "[role='menuitem']:has-text('MP4')"
    role:
      role: "menuitem"
      name: "MP4"
    text: "MP4"

  result_video:
    css:
      - "video"                                  # PLACEHOLDER — verify against live UI

# =============================================================================
# hard_stops — blocking-screen TEXT PATTERNS the worker scans for.
#
# On a match the worker stops cleanly, screenshots, marks the job needs_human,
# and exits — it NEVER tries to solve, bypass, or work around any of these.
#
# These phrases are MERGED ON TOP OF a built-in default set (see
# browser/hard_stops.py), so you can only ADD phrases here — you can't disable a
# whole category. Matching is case-insensitive substring, against the page's
# VISIBLE text.
#
# IMPORTANT — keep these SPECIFIC. Broad words like "Sign in", "Upgrade",
# "billing", "cookies", "Accept all", or "Before you continue" appear on almost
# every logged-in Google page (account menus, settings links, cookie banners)
# and would halt EVERY run. Match the actual blocking WALL, not incidental UI
# chrome. Edit to match what your account/language actually shows.
# =============================================================================
hard_stops:
  login:
    - "Sign in to continue"
    - "You need to sign in"
  captcha:
    - "I'm not a robot"
    - "verify you are human"
    - "reCAPTCHA"
  suspicious_activity:
    - "unusual activity"
    - "suspicious activity"
    - "We've detected unusual traffic"
  rate_limit:
    - "usage limit"
    - "Too many requests"
    - "You've reached your limit"
    - "quota exceeded"
  subscription_upgrade:
    - "Upgrade your plan to continue"
    - "subscribe to continue"
  payment:
    - "add a payment method"
    - "update your payment"
  safety_refusal:
    - "I can't help with that"
    - "can't generate that"
    - "violates our policies"
  content_policy:
    - "content policy"
    - "policy violation"
    - "prohibited content"
  age_identity_verification:
    - "verify your age"
    - "verify your identity"
    - "age verification"
  account_recovery:
    - "recover your account"
    - "Verify it's you"
  consent_policy_modal:
    - "Before you continue to"
    - "accept the terms to continue"
